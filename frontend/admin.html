<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concierge Dashboard | Admin</title>
    <link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/responsive.css">
</head>
<body class="admin-view">
    <header class="navbar">
        <a href="index.html" class="logo" style="text-decoration: none; color: inherit;">ADMIN CONCIERGE</a>
        <nav><a href="index.html">Live Site</a></nav>
    </header>

    <div style="padding: 10rem 5%; max-width: 1200px; margin: 0 auto;">
        <h1 style="font-family: 'Playfair Display'; margin-bottom: 3rem; font-size: 3rem;">Elite Performance</h1>
        <div class="grid" style="grid-template-columns: repeat(3, 1fr); margin-bottom: 5rem;">
            <div style="background: var(--card-bg); padding: 3rem; border: 1px solid var(--border); text-align: center;">
                <p style="color: var(--gold); letter-spacing: 2px;">REVENUE</p>
                <h2 style="font-size: 3rem;">$142.5K</h2>
            </div>
            <div style="background: var(--card-bg); padding: 3rem; border: 1px solid var(--border); text-align: center;">
                <p style="color: var(--gold); letter-spacing: 2px;">ESTABLISHMENTS</p>
                <h2 style="font-size: 3rem;">12</h2>
            </div>
            <div style="background: var(--card-bg); padding: 3rem; border: 1px solid var(--border); text-align: center;">
                <p style="color: var(--gold); letter-spacing: 2px;">ACTIVE ORDERS</p>
                <h2 style="font-size: 3rem;">24</h2>
            </div>
        </div>
    </div>
</body>
</html>
