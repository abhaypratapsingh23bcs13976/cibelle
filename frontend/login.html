<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.socket.io; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://images.unsplash.com https://www.transparenttextures.com https://grainy-gradients.vercel.app blob:; connect-src 'self' ws: wss: http://localhost:* https://nominatim.openstreetmap.org https://cdn.socket.io;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Entry | Cibelle</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:wght@700&family=Poppins:wght@200;300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <!-- Grain Effect -->
    <svg style="display:none">
        <filter id="noiseFilter">
            <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch"/>
        </filter>
    </svg>
    <div class="grain"></div>

    <div class="auth-wrapper">
        <div class="auth-bg-overlay"></div>
        <div class="auth-glow"></div>
        <canvas id="auth-particles"></canvas>
        
        <div class="auth-card">
            <a href="index.html" class="logo" style="margin-bottom: 3rem; display: block; text-decoration: none; color: inherit;">CIBELLE</a>
            
            <h2>Welcome Back</h2>
            <p class="sub-title">Enter the Cibelle Private Club</p>
            
            <form onsubmit="handleAuthSubmit(event, 'index.html')">
                <div class="luxury-input-group">
                    <input type="email" class="luxury-input" id="email" placeholder=" " required>
                    <label for="email" class="luxury-label">Email Address</label>
                </div>
                
                <div class="luxury-input-group">
                    <div class="pass-wrapper">
                        <input type="password" class="luxury-input" id="password" placeholder=" " required>
                        <label for="password" class="luxury-label">Secure Passcode</label>
                        <span class="pass-toggle" onclick="togglePasswordVisibility('password')">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </span>
                    </div>
                </div>
                
                <button type="submit" class="btn-auth-premium" id="auth-btn">ENTER THE CLUB</button>
            </form>
            
            <p class="auth-switch">
                New to the circle? <a href="register.html" style="color: var(--gold); text-decoration: none; font-weight: 600;">Request Access</a>
            </p>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
